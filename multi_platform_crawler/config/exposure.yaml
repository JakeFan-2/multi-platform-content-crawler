# 多平台内容采集系统 - 曝光量静态配置
# 曝光量实际为各平台粉丝量，非动态爬取值
# 格式：平台标识: 数值（null 表示无数据，采集时显示为 "/"）
# 
# 重要：平台标识必须与 PLATFORM_COLLECTOR_MAP 中的键一致
# 映射关系：
#   wechat -> wechat (微信公众号)
#   weibo -> weibo (微博)
#   toutiao -> toutiao (头条号)
#   zhihu -> zhihu (知乎)
#   baijiahao -> baijiahao (百家号)
#   netease -> netease (网易号)
#   qq -> qq (企鹅号)
#   yidian -> yidian (一点资讯)
#   xueqiu -> xueqiu (雪球)
#   zaker -> zaker (ZAKER)

# 微信公众号
wechat: 微信公众号粉丝数

# 微博
weibo: 微博粉丝数

# 头条号
toutiao: 头条号粉丝数

# 知乎
zhihu: 知乎粉丝数

# 百家号
baijiahao: 百家号粉丝数   

# 网易号
netease: 网易号粉丝数

# 企鹅号
qq: 企鹅号粉丝数

# 一点资讯号
yidian: 23000

# 雪球号
xueqiu: 26000

# ZAKER号
zaker: 440000
