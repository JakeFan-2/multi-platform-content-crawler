# ============================================================
# 平台采集器配置模板
# ============================================================
# 使用方法：
# 1. 复制本文件为新平台配置文件 (如 toutiao.yaml)
# 2. 修改 platform 名称
# 3. 填写实际的URL、账号密码
# 4. 配置登录选择器
# ============================================================

# -------------------- 基础信息 --------------------
# 平台标识符（与文件名一致）
platform: "{{platform_name}}"

# -------------------- URLs --------------------
# 主页面URL（登录后的首页）
main_url: "https://example.com/home"

# 登录页面URL
login_url: "https://example.com/login"

# -------------------- 认证信息 --------------------
# 账号密码不再通过 YAML 配置文件管理
# 采集器代码直接从 .env 文件加载账号密码
# 环境变量命名规范：{PLATFORM}_USERNAME / {PLATFORM}_PASSWORD
# 如需修改账号密码，请编辑项目根目录的 .env 文件

# -------------------- Cookie设置 --------------------
cookie_dir: "cookies"
cookie_file: "{{cookie_dir}}/{{platform}}.json"

# -------------------- 超时配置 (毫秒) --------------------
# 页面默认超时
default_timeout: 30000
# 元素等待超时
element_timeout: 8000
# 短超时（用于快速检查）
element_short_timeout: 5000
# 兜底超时
element_fallback_timeout: 1000

# -------------------- 重试配置 --------------------
# 最大重试次数
max_retries: 2
# 重试延迟范围（毫秒）
retry_delay_min: 3000
retry_delay_max: 5000

# -------------------- User-Agent --------------------
user_agents:
  - "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  - "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:121.0) Gecko/20100101 Firefox/121.0"

# -------------------- 人类行为模拟 --------------------
# 输入延迟（毫秒）
typing_delay_min: 50
typing_delay_max: 150

# -------------------- 功能开关 --------------------
# 是否启用反检测
enable_stealth: true
# 是否随机User-Agent
enable_user_agent_random: true
# 是否启用人类模拟输入
enable_human_typing: true

# -------------------- 登录选择器 --------------------
# TODO: 根据实际登录页面修改
login:
  # 用户名输入框选择器（按优先级排序）
  username_selectors:
    - css: "input[name='username']"
    - id: "username"
    - css: "input.input-text[type='text']"
    - role: "textbox"
      name: "请输入账号"

  # 密码输入框选择器
  password_selectors:
    - css: "input[name='password']"
    - id: "password"
    - css: "input.input-text[type='password']"
    - role: "textbox"
      name: "请输入密码"

  # 登录按钮选择器
  login_button_selectors:
    - css: "button[type='submit']"
    - css: "input[type='submit']"
    - id: "login-btn"
    - role: "button"
      name: "登录"

# -------------------- 导航选择器 --------------------
# TODO: 如果需要通过菜单导航到文章列表，配置此项
navigation:
  # 一级菜单选择器
  menu_level1_selectors:
    - id: "menu_id"
    - css: ".menu-class"
    - role: "link"
      name: "菜单名称"

  # 二级菜单选择器
  menu_level2_selectors:
    - css: ".submenu a"
    - role: "link"
      name: "子菜单名称"

# -------------------- 文章列表选择器 --------------------
# TODO: 根据实际页面结构配置
article_list:
  # iframe选择器（如需要）
  iframe_selectors:
    - id: "content_iframe"
    - css: "iframe[src*='article']"

  # 表格/列表容器选择器
  table_selectors:
    - css: ".article-list"
    - css: ".data-table"

  # 行选择器
  row_selectors:
    - css: ".article-item"
    - css: "tr[data-id]"

  # 字段选择器
  field_selectors:
    title: ".title"
    publish_date: ".date"
    read_count: ".read-num"
    like_count: ".like-num"
    comment_count: ".comment-num"
    url: ".title a"

# -------------------- 文章URL模式 --------------------
# 用于拼接完整文章URL
# {article_id} 会替换为提取的文章ID
article_url_pattern: "https://example.com/article/{article_id}"

# -------------------- 登录态验证 --------------------
# TODO: 配置登录后页面特征
login_check:
  # 登录成功后URL包含的关键字
  success_url_contains: "/home"
  # 登录后应存在的元素选择器
  logged_in_element:
    - css: ".user-info"
    - role: "link"
      name: "用户名"
